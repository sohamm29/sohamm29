name: Update profile cards

on:
  schedule:
    - cron: "0 3 * * *" # Run every day at 03:00
  push:
    paths:
      - ".github/workflows/profile-cards.yml" # Run any time this file is modified
  workflow_dispatch: # Run manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Generate profile cards
        env:
          USERNAME: ${{ github.repository_owner }}
        run: |
          mkdir -p profile

          # Profile trophies — github-profile-trophy (default theme)
          curl -fsSL --retry 5 --retry-delay 10 \
            "https://github-profile-trophy.vercel.app/?username=${USERNAME}&row=1&column=7" \
            -o profile/trophy.svg

          # Stats card — github-readme-stats (default theme)
          curl -fsSL --retry 5 --retry-delay 10 \
            "https://github-readme-stats.vercel.app/api?username=${USERNAME}&show_icons=true" \
            -o profile/stats.svg

          # Top languages — github-readme-stats (default theme)
          curl -fsSL --retry 5 --retry-delay 10 \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=${USERNAME}&layout=compact" \
            -o profile/top-langs.svg

      - name: Commit profile cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/trophy.svg profile/stats.svg profile/top-langs.svg
          git commit -m "Update profile cards" || exit 0
          git push
