name: WakaTime Readme

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 00:30 UTC
    - cron: "30 0 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    name: Update WakaTime stats in README
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: "true"
          BLOCKS: "░▓"
          LANG_COUNT: "8"
          TIME_RANGE: "last_7_days"
